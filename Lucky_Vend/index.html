<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Vending Roulette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scanlines"></div>
  <div class="crt-vignette"></div>

  <header class="hud">
    <div class="balance-panel">
      <canvas id="cap-icon" width="16" height="16"></canvas>
      <span id="balance">50</span>
    </div>
    <button class="pixel-btn inventory-btn" id="open-inventory">ИНВЕНТАРЬ</button>
  </header>

  <main class="game-area">
    <canvas id="background" width="640" height="480"></canvas>
    <div class="machine-wrapper">
      <canvas id="machine" width="320" height="420"></canvas>
      <div class="slots-overlay">
        <div class="slot-window">
          <canvas class="slot-reel" id="slot-0" width="68" height="84"></canvas>
        </div>
        <div class="slot-window">
          <canvas class="slot-reel" id="slot-1" width="68" height="84"></canvas>
        </div>
        <div class="slot-window">
          <canvas class="slot-reel" id="slot-2" width="68" height="84"></canvas>
        </div>
      </div>
      <div class="machine-stats" id="machine-stats">
        <div><span>ПОСЛ</span><strong id="last-win">—</strong></div>
        <div><span>БАНОК</span><strong id="total-won">0</strong></div>
        <div><span>КРЫШЕК</span><strong id="caps-spent">0</strong></div>
      </div>
      <div class="spin-btn-wrap">
        <button class="pixel-btn spin-btn" id="spin-btn">КРУТИТЬ (1 🧢)</button>
      </div>
    </div>
  </main>

  <div class="message-toast" id="message"></div>

  <div class="modal hidden" id="inventory-modal">
    <div class="modal-content pixel-border">
      <div class="modal-header">
        <h2>ИНВЕНТАРЬ</h2>
        <button class="pixel-btn close-btn" id="close-inventory">✕</button>
      </div>
      <div class="inventory-grid" id="inventory-grid"></div>
      <p class="sell-hint">Продать: синий — 50 🧢 · красный — 100 🧢</p>
    </div>
  </div>

  <div class="modal hidden" id="win-modal">
    <div class="modal-content pixel-border win-content">
      <h2 id="win-title">ДЖЕКПОТ!</h2>
      <canvas id="win-drink" width="64" height="80"></canvas>
      <p id="win-text"></p>
      <button class="pixel-btn" id="close-win">ОК</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
